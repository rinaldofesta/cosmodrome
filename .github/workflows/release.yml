name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-14
    permissions:
      contents: write
    env:
      HAS_CERT: ${{ secrets.DEVELOPER_ID_CERT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build .app bundle
        run: |
          swift build -c release
          bash Scripts/bundle.sh

      - name: Import signing certificate
        if: env.HAS_CERT == 'true'
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain
          rm cert.p12

      - name: Sign, package DMG, and notarize
        if: env.HAS_CERT == 'true'
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARIZE: "1"
        run: |
          bash Scripts/build-dmg.sh --skip-build --sign "$CODESIGN_IDENTITY"

      - name: Package DMG (ad-hoc signed)
        if: env.HAS_CERT != 'true'
        run: |
          bash Scripts/build-dmg.sh --skip-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Cosmodrome.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
